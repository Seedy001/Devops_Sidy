apiVersion: apps/v1
kind: Deployment
metadata:
  name: mon-application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mon-application
  template:
    metadata:
      labels:
        app: mon-application
    spec:
      containers:
      - name: mon-application
        image: mon-application:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 80
